[package]
name = "integration-tests"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "integration-tests"
path = "src/main.rs"

[[test]]
name = "mock_integration"
path = "tests/mock_integration.rs"

[dependencies]
policy = { path = "../policy" }
serde_json = "1"

[dev-dependencies]
tempfile = { workspace = true }
pretty_assertions = { workspace = true }
assert_cmd = "2"
predicates = "3"
winrsbox = { path = "../launcher" }
